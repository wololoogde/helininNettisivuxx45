<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helinin AI Chat</title>

<style>

body{
font-family:Arial;
background:#f2f6fa;
margin:0;
}

header{
background:#007acc;
color:white;
text-align:center;
padding:20px;
}

main{
max-width:600px;
margin:40px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

#chat{
height:350px;
overflow-y:auto;
padding:10px;
border:1px solid #ddd;
border-radius:8px;
background:#fafafa;
margin-bottom:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.message{
padding:10px 14px;
border-radius:16px;
max-width:70%;
font-size:15px;
}

.user{
background:#007acc;
color:white;
align-self:flex-end;
}

.bot{
background:#e6e6e6;
align-self:flex-start;
}

#typing{
font-style:italic;
font-size:14px;
color:#666;
display:none;
}

.inputRow{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 18px;
border:none;
background:#007acc;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#005fa3;
}

</style>
</head>

<body>

<header>
<h1>helininNettisivuxx45</h1>
<p>Tekoälyassistentti – jutellaan!</p>
</header>

<main>

<div id="chat"></div>

<div id="typing">Assistentti kirjoittaa...</div>

<div class="inputRow">
<input id="userInput" placeholder="Kirjoita viesti...">
<button onclick="sendMessage()">Lähetä</button>
</div>

</main>

<script>

const chat=document.getElementById("chat")
const input=document.getElementById("userInput")
const typing=document.getElementById("typing")

function addMessage(text,type){

const msg=document.createElement("div")
msg.className="message "+type
msg.textContent=text

chat.appendChild(msg)

chat.scrollTop=chat.scrollHeight
}

function random(arr){
return arr[Math.floor(Math.random()*arr.length)]
}

function sendMessage(){

const message=input.value.trim()

if(message==="") return

addMessage(message,"user")

input.value=""

typing.style.display="block"

setTimeout(()=>{

typing.style.display="none"

const reply=generateResponse(message)

addMessage(reply,"bot")

},800)

}

function generateResponse(input){

input=input.toLowerCase()

const greetings=[
"Hei! 😊",
"Moikka!",
"Terve!",
"Hei siellä!"
]

const thanks=[
"Ole hyvä!",
"Ei kestä!",
"Ilo auttaa!"
]

const jokes=[
"Miksi tietokone meni lääkäriin? Sillä oli virus 😄",
"Miksi ohjelmoija meni rannalle? Koska siellä oli paljon byteja!"
]

if(input.includes("hei")||input.includes("moi")||input.includes("terve"))
return random(greetings)

if(input.includes("kuka olet"))
return "Olen Helinin nettisivun tekoälyassistentti."

if(input.includes("mitä voit tehdä"))
return "Voin keskustella kanssasi ja vastata yksinkertaisiin kysymyksiin."

if(input.includes("kiitos"))
return random(thanks)

if(input.includes("vitsi"))
return random(jokes)

if(input.includes("mitä kuuluu"))
return "Minulle kuuluu hyvää! Entä sinulle?"

if(input.includes("sää"))
return "En vielä osaa tarkistaa säätä."

return "Hmm... en ihan ymmärtänyt. Kysy esimerkiksi 'kuka olet' tai 'vitsi'."

}

input.addEventListener("keypress",function(e){
if(e.key==="Enter") sendMessage()
})

addMessage("Hei! Olen Helinin AI-assistentti. 😊","bot")

</script>

</body>
</html>
